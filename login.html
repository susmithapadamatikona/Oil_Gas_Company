<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EnergyCorp Login</title>
  <meta name="description" content="Login to EnergyCorp Oil & Gas dashboard.">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page page-loading" data-page="login">
  <div class="site-loader" data-loader>
    <div class="loader-card">
      <div class="brand"><img class="brand__logo" src="Assets/logo stackly.webp" alt="Stackly"></div>
      <div class="loader-ring" aria-hidden="true"></div>
      <p>Loading secure access...</p>
    </div>
  </div>

  <div class="site-overlay" data-overlay></div>

  <div class="auth-shell">
    <header class="site-header site-header--solid" data-header>
      <div class="container site-header__inner">
        <a class="brand" href="index.html"><img class="brand__logo" src="Assets/logo stackly.webp" alt="Stackly"></a>
        <nav class="site-nav" data-nav aria-label="Primary navigation">
          <div class="site-nav__links">
            <a data-nav-link href="index.html">Home</a>
            <a data-nav-link href="about.html">About</a>
            <a data-nav-link href="services.html">Services</a><a data-nav-link href="projects.html">Projects</a><a data-nav-link href="sustainability.html">Sustainability</a>
            <a data-nav-link href="blog.html">Blog</a>
            <a data-nav-link href="contact.html">Contact</a>
          </div>
          <div class="nav-actions">
            <a class="btn btn--ghost" data-nav-link href="login.html">Login</a>
            <a class="btn btn--primary" data-nav-link href="signup.html">Sign Up</a>
          </div>
        </nav>
        <button class="nav-toggle" data-nav-toggle aria-controls="site-nav" aria-expanded="false" aria-label="Open navigation">☰</button>
      </div>
    </header>

    <main class="auth-main">
      <section class="auth-card" data-reveal>
        <div class="section-eyebrow">Secure Access</div>
        <h1 class="auth-card__title">Welcome back to EnergyCorp</h1>
        <p class="auth-card__lead">Sign in to manage projects, reports, and operational performance.</p>

        <form class="auth-form" data-login-form>
          <div class="field">
            <label for="login-email">Email Address</label>
            <div class="input-wrap">
              <input id="login-email" name="email" type="email" placeholder="name@company.com" autocomplete="email">
            </div>
            <div class="field-error"></div>
          </div>
          <div class="field">
            <label for="login-password">Password</label>
            <div class="input-wrap">
              <input id="login-password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password">
              <button class="password-toggle" type="button" data-password-toggle aria-controls="login-password" aria-label="Show password">Show</button>
            </div>
            <div class="field-error"></div>
          </div>
          <div class="form-row">
            <label class="form-check"><input type="checkbox" name="remember">Remember me</label>
            <button type="button" class="btn btn--ghost" data-forgot-password>Forgot password?</button>
          </div>
          <button class="btn btn--primary btn--full" type="submit">Login</button>
        </form>

        <div class="auth-note">Need an account? <a href="signup.html"><strong>Create one here</strong></a>.</div>
      </section>
    </main>

    <footer class="auth-footer">
      <div class="container">
        <p>© <span data-current-year></span> EnergyCorp Oil & Gas</p>
      </div>
    </footer>
  </div>

  <script src="js/validation.js"></script>
  <script src="vendor/aos/aos.js"></script><script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
