      <stop offset="0%" stop-color="#ffd08a" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#ff7a00" stop-opacity=".05"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
