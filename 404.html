<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | Page Not Found</title>
  <meta name="description" content="The requested EnergyCorp page could not be found.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="error-page">
  <main class="error-main">
    <div class="error-orbit error-orbit--one" aria-hidden="true"></div>
    <div class="error-orbit error-orbit--two" aria-hidden="true"></div>
    <section class="container error-content" data-reveal>
      <div class="section-eyebrow">Navigation Error</div>
      <p class="error-code" aria-hidden="true">404</p>
      <h1>That route is currently offline.</h1>
      <p>The page you selected is not available yet. Return to the home page to continue exploring our energy services and operations.</p>
      <div class="error-actions">
        <a class="btn btn--primary" href="index.html">Back to Home</a>
        <button class="btn btn--secondary" type="button" onclick="history.back()">Go Back</button>
      </div>
    </section>
  </main>

  <script src="vendor/aos/aos.js"></script><script src="js/app.js"></script>
</body>
</html>
